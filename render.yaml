services:
  - type: web
    name: cb-forceplate
    runtime: python
    plan: starter            # has a persistent disk; "free" does not
    region: ohio
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    healthCheckPath: /_stcore/health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.4"
    disk:
      name: data
      mountPath: /opt/render/project/src/data   # persists data/store uploads + settings.json
      sizeGB: 1
